<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vhalen Company — Onboarding Estratégico</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --navy:    #0D1B2A;
  --navy2:   #0A1520;
  --navy3:   #112236;
  --steel:   #4A7FA5;
  --steel-l: #6B9DC0;
  --steel-ll:#A8C4D8;
  --surface: #F4F6F7;
  --border:  rgba(74,127,165,0.22);
  --border2: rgba(74,127,165,0.10);
  --text:    #E4EEF5;
  --muted:   #6B8BA4;
  --white:   #FFFFFF;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--navy2);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* subtle radial glow only — no grid */
.bg-glow {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(74,127,165,0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ══ TOP BAR ══ */
.top-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 36px;
  background: rgba(10,21,32,0.92);
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 30px; height: 30px;
  border: 1px solid var(--steel);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--steel-l);
  background: rgba(74,127,165,0.08);
  flex-shrink: 0;
}
.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 600;
  color: var(--white); letter-spacing: 0.04em;
}
.brand-name span { color: var(--steel-l); }
.brand-tag {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 0.18em;
  color: var(--muted); text-transform: uppercase;
  padding-left: 10px;
  border-left: 1px solid var(--border);
  margin-left: 4px;
}
.step-info {
  display: flex; align-items: center; gap: 10px;
}
.step-dots { display: flex; gap: 4px; }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(74,127,165,0.25);
  transition: all 0.3s;
}
.dot.active { background: var(--steel); box-shadow: 0 0 5px var(--steel); width: 14px; border-radius: 3px; }
.dot.done   { background: var(--steel-l); }
.step-txt {
  font-family: 'DM Mono', monospace;
  font-size: 9px; color: var(--muted);
  letter-spacing: 0.1em;
}
.step-txt span { color: var(--steel-l); }

/* ══ PROGRESS ══ */
.progress-track {
  position: relative; z-index: 10;
  height: 2px; background: rgba(74,127,165,0.08);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--steel), var(--steel-l));
  transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; right: -3px; top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--steel-ll);
  box-shadow: 0 0 8px var(--steel-l);
}

/* ══ STAGE ══ */
.stage {
  flex: 1;
  position: relative; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding: 28px 36px;
  overflow: hidden;
}

/* ══ CARD ══ */
.card {
  width: 100%; max-width: 580px;
  animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(26px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-20px); }
}
.card.out { animation: cardOut 0.28s ease both; }

.card-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.25em;
  color: var(--steel-l); text-transform: uppercase;
  margin-bottom: 16px;
  padding: 4px 12px;
  border: 1px solid var(--border2);
  background: rgba(74,127,165,0.05);
}
.card-eyebrow::before {
  content: '';
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--steel);
}
.card-question {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(20px, 3.2vw, 28px);
  font-weight: 300; line-height: 1.35;
  color: var(--white); margin-bottom: 8px;
}
.card-hint {
  font-size: 12px; color: var(--muted);
  margin-bottom: 24px; line-height: 1.65;
  font-style: italic;
}

/* ══ WELCOME SCREEN ══ */
.welcome-card {
  width: 100%; max-width: 560px;
  text-align: center;
  animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.welcome-logo-wrap {
  margin: 0 auto 32px;
  width: 80px; height: 80px;
  border: 1px solid var(--steel);
  display: flex; align-items: center; justify-content: center;
  background: rgba(74,127,165,0.08);
  position: relative;
}
.welcome-logo-wrap::before {
  content: '';
  position: absolute; inset: -6px;
  border: 1px solid rgba(74,127,165,0.15);
}
.welcome-logo-wrap::after {
  content: '';
  position: absolute; inset: -12px;
  border: 1px solid rgba(74,127,165,0.07);
}
.welcome-logo-text {
  font-family: 'DM Mono', monospace;
  font-size: 22px; font-weight: 500;
  color: var(--steel-l);
  letter-spacing: 0.05em;
}
.welcome-company {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 6vw, 44px);
  font-weight: 300; color: var(--white);
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.welcome-company span { color: var(--steel-l); font-weight: 600; }
.welcome-tagline {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.3em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 24px;
}
.welcome-line {
  width: 48px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--steel), transparent);
  margin: 20px auto;
}
.welcome-desc {
  font-size: 14px; color: var(--muted);
  line-height: 1.8; max-width: 420px;
  margin: 0 auto 28px;
}
.welcome-desc strong { color: var(--steel-ll); font-weight: 500; }
.welcome-badges {
  display: flex; justify-content: center;
  flex-wrap: wrap; gap: 8px; margin-top: 4px;
}
.badge {
  padding: 5px 14px;
  border: 1px solid var(--border2);
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em;
  color: var(--muted); text-transform: uppercase;
  border-radius: 20px;
  background: rgba(74,127,165,0.04);
}

/* ══ INPUTS — clean, no glitch ══ */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.18em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 7px;
}
.req { color: var(--steel); }

input[type="text"],
input[type="email"],
textarea,
select {
  width: 100%;
  background: rgba(244,246,247,0.04);
  border: 1px solid rgba(74,127,165,0.18);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 300;
  padding: 11px 14px;
  outline: none;
  border-radius: 3px;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  /* critical: isolate from background patterns */
  isolation: isolate;
  position: relative;
}
input:focus,
textarea:focus,
select:focus {
  border-color: var(--steel);
  background: rgba(74,127,165,0.07);
  box-shadow: 0 0 0 3px rgba(74,127,165,0.09);
}
input::placeholder,
textarea::placeholder { color: rgba(200,215,228,0.25); }
textarea { resize: none; min-height: 108px; line-height: 1.7; }
select { cursor: pointer; }
select option { background: #112236; color: var(--white); }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ══ CHOICES ══ */
.choices { display: flex; flex-direction: column; gap: 7px; }

.choice {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px;
  border: 1px solid rgba(74,127,165,0.15);
  background: rgba(74,127,165,0.03);
  cursor: pointer;
  border-radius: 3px;
  font-size: 13px; color: rgba(255,255,255,0.6);
  transition: border-color 0.16s, background 0.16s, color 0.16s;
  user-select: none;
  isolation: isolate;
}
.choice:hover {
  border-color: rgba(74,127,165,0.4);
  color: rgba(255,255,255,0.9);
}
.choice.selected {
  border-color: var(--steel);
  background: rgba(74,127,165,0.11);
  color: var(--white);
  box-shadow: 0 0 0 1px rgba(74,127,165,0.2);
}
.choice-dot {
  width: 18px; height: 18px;
  border: 1.5px solid rgba(74,127,165,0.3);
  border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: transparent;
  transition: all 0.16s;
}
.choice.sq .choice-dot { border-radius: 3px; }
.choice.selected .choice-dot {
  background: var(--steel);
  border-color: var(--steel);
  color: var(--white);
}

/* ══ RATING ══ */
.rating-block { display: flex; flex-direction: column; gap: 10px; }
.r-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.r-label { font-size: 12px; color: rgba(255,255,255,0.65); flex: 1; }
.stars { display: flex; gap: 5px; flex-shrink: 0; }
.star {
  width: 34px; height: 34px;
  border: 1px solid rgba(74,127,165,0.2);
  background: rgba(244,246,247,0.03);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); cursor: pointer;
  border-radius: 3px; transition: all 0.14s;
  isolation: isolate;
}
.star:hover { border-color: var(--steel); color: var(--steel-l); }
.star.on    { background: var(--steel); border-color: var(--steel); color: var(--white); }

/* ══ NAV ══ */
.nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 36px;
  background: rgba(10,21,32,0.9);
  border-top: 1px solid var(--border2);
  flex-shrink: 0;
}
.btn-back {
  background: none; border: none;
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  color: var(--muted); cursor: pointer;
  transition: color 0.2s; text-transform: uppercase;
  padding: 8px 0;
}
.btn-back:hover:not(:disabled) { color: var(--steel-ll); }
.btn-back:disabled { opacity: 0.2; cursor: default; }

.btn-next {
  display: flex; align-items: center; gap: 10px;
  background: var(--steel);
  border: none; border-radius: 3px;
  padding: 12px 32px;
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--white); cursor: pointer;
  transition: all 0.18s;
  box-shadow: 0 4px 16px rgba(74,127,165,0.25);
}
.btn-next:hover { background: var(--steel-l); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(74,127,165,0.35); }
.btn-next:active { transform: translateY(0); }

/* ══ SUCCESS ══ */
.success-screen {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  position: fixed; inset: 0; z-index: 100;
  background: var(--navy2);
  padding: 40px;
}
.success-screen.show { display: flex; }

.success-visual {
  position: relative;
  width: 160px; height: 160px;
  margin: 0 auto 32px;
  animation: popIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s both;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.6); }
  to   { opacity:1; transform:scale(1); }
}
.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(74,127,165,0.2);
  animation: ringPulse 3s ease-in-out infinite;
}
.ring:nth-child(1) { inset:0; animation-delay:0s; }
.ring:nth-child(2) { inset:16px; border-color:rgba(74,127,165,0.32); animation-delay:0.5s; }
.ring:nth-child(3) { inset:32px; border-color:rgba(74,127,165,0.5); animation-delay:1s; }
@keyframes ringPulse {
  0%,100%{ opacity:0.4; }
  50%{ opacity:1; }
}
.success-core {
  position: absolute;
  inset: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--steel), var(--steel-l));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--white);
  box-shadow: 0 0 40px rgba(74,127,165,0.5);
  animation: glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100%{ box-shadow:0 0 30px rgba(74,127,165,0.4); }
  50%{ box-shadow:0 0 55px rgba(74,127,165,0.7); }
}

.success-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(26px,5vw,38px); font-weight: 300;
  color: var(--white); margin-bottom: 8px;
  animation: fadeUp 0.5s ease 0.4s both;
}
.success-client {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--steel-l);
  letter-spacing: 0.15em; margin-bottom: 20px;
  animation: fadeUp 0.5s ease 0.5s both;
}
.success-line {
  width: 40px; height: 1px;
  background: var(--steel); margin: 0 auto 20px;
  box-shadow: 0 0 6px var(--steel);
  animation: fadeUp 0.5s ease 0.55s both;
}
.success-msg {
  font-size: 13px; color: var(--muted);
  max-width: 380px; line-height: 1.85; margin-bottom: 32px;
  animation: fadeUp 0.5s ease 0.6s both;
}
.btn-pdf {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--steel); border: none; border-radius: 3px;
  padding: 15px 40px;
  font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--white); cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(74,127,165,0.35);
  animation: fadeUp 0.5s ease 0.7s both;
}
.btn-pdf:hover { background: var(--steel-l); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(74,127,165,0.45); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

@media (max-width:600px) {
  .top-bar, .nav { padding: 12px 18px; }
  .stage { padding: 20px 18px; }
  .grid2 { grid-template-columns: 1fr; }
  .r-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .brand-tag { display: none; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="top-bar" id="topBar">
  <div class="brand">
    <div class="brand-logo">VC</div>
    <div class="brand-name">Vhalen <span>Company</span></div>
    <div class="brand-tag">Strategic Intelligence</div>
  </div>
  <div class="step-info">
    <div class="step-dots" id="stepDots"></div>
    <div class="step-txt">Etapa <span id="stepNum">1</span> / <span id="totalNum">—</span></div>
  </div>
</div>

<div class="progress-track" id="progressTrack">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="stage" id="stage"></div>

<div class="nav" id="navBar">
  <button class="btn-back" id="btnBack" onclick="goBack()" disabled>← Voltar</button>
  <button class="btn-next" id="btnNext" onclick="goNext()">Continuar →</button>
</div>

<div class="success-screen" id="successScreen"></div>

<script>
const ratings = {}, mc = {}, sc = {}, flds = {};

const steps = [
  // 0 WELCOME
  { type:'welcome' },

  // 1 ID
  { type:'grid2', eyebrow:'01 · Identificação', question:'Como você se identifica?', hint:'Dados do responsável e da empresa.',
    inputs:[
      {id:'nome',    label:'Nome / Razão Social', ph:'Nome da empresa',     req:true},
      {id:'resp',    label:'Seu Nome',            ph:'Nome completo',       req:true},
      {id:'cargo',   label:'Cargo / Posição',     ph:'Seu cargo',           req:false},
      {id:'email',   label:'E-mail',              ph:'contato@empresa.com', req:false},
    ]
  },

  // 2 EMPRESA
  { type:'grid2', eyebrow:'01 · Identificação', question:'Sobre a empresa.', hint:'Contexto rápido do negócio.',
    inputs:[
      {id:'segmento',label:'Segmento / Setor',     ph:'Ex: Tecnologia, Saúde...', req:true},
      {id:'tempo',   label:'Tempo de Mercado',      ph:'Ex: 3 anos',               req:false},
      {id:'local',   label:'Localização / Atuação', ph:'Cidade, Estado ou âmbito', req:false},
      {id:'site',    label:'Website / Redes',       ph:'Links principais',          req:false},
    ]
  },

  // 3 O QUE FAZ
  { type:'textarea', eyebrow:'02 · Contexto', question:'O que a empresa faz?',
    hint:'Descreva o negócio principal com suas próprias palavras — sem jargão.',
    id:'oqueefaz', ph:'Seja direto e objetivo...', req:true },

  // 4 DESAFIO
  { type:'textarea', eyebrow:'03 · Desafios', question:'Qual é o maior desafio da empresa hoje?',
    hint:'O problema que mais limita o crescimento ou trava a operação.',
    id:'desafio', ph:'Descreva com clareza e precisão...', req:true },

  // 5 GARGALOS
  { type:'multicheck', eyebrow:'03 · Desafios', question:'Onde estão os maiores gargalos?',
    hint:'Selecione todas as áreas que limitam o crescimento hoje.',
    id:'gargalos', options:['Estratégia e direção','Geração de leads e vendas','Processos internos','Cultura e equipe','Marketing e posicionamento','Tecnologia e ferramentas','Financeiro e escalabilidade'] },

  // 6 OBJETIVOS
  { type:'textarea', eyebrow:'03 · Desafios', question:'Quais são os 3 objetivos para os próximos 12 meses?',
    hint:'Os resultados mais importantes. Seja concreto.',
    id:'objetivos', ph:'1.\n2.\n3.', req:true },

  // 7 ESTRUTURA
  { type:'select4', eyebrow:'04 · Estrutura', question:'Como está a estrutura operacional?', hint:'Visão rápida das principais áreas.',
    selects:[
      {id:'comercial', label:'Área Comercial',          opts:['','Sim, estruturada','Em estruturação','Não existe']},
      {id:'mktarea',   label:'Área de Marketing',       opts:['','Sim, interna','Terceirizado','Em estruturação','Não existe']},
      {id:'crm',       label:'Uso de CRM',              opts:['','Sim — uso ativamente','Sim — pouco usado','Uso planilha','Não uso nada']},
      {id:'processos', label:'Processos Documentados',  opts:['','Sim, bem documentados','Parcialmente','Não']},
    ]
  },

  // 8 FERRAMENTAS
  { type:'multicheck', eyebrow:'04 · Estrutura', question:'Quais ferramentas a empresa usa hoje?',
    hint:'Selecione todas que se aplicam.',
    id:'ferramentas', options:['Google Workspace','Notion / Confluence','Slack / Teams','HubSpot / CRM próprio','Trello / Asana / Monday','Planilhas (Excel / Sheets)','Instagram / Meta Ads','Google Ads','Nenhuma relevante'] },

  // 9 HISTORICO
  { type:'single', eyebrow:'05 · Histórico', question:'Já contratou consultoria estratégica antes?',
    hint:'Nos ajuda a entender o ponto de partida.',
    id:'historico', options:['Sim — foi positivo','Sim — não trouxe resultado','Sim — experiência mista','Não, esta é a primeira vez'] },

  // 10 NÃO REPETIR
  { type:'multicheck', eyebrow:'05 · Histórico', question:'O que você não quer repetir?',
    hint:'Selecione o que quer evitar desta vez.',
    id:'naorepetir', options:['Falta de resultados concretos','Planejamento sem execução','Falta de comunicação','Solução genérica','Muito relatório, pouca ação','Mudanças muito lentas'] },

  // 11 EXPECTATIVAS
  { type:'textarea', eyebrow:'06 · Expectativas', question:'O que você espera nos primeiros 90 dias?',
    hint:'Quais resultados representariam um começo de sucesso para você?',
    id:'expectativas', ph:'Seja específico e realista...', req:true },

  // 12 TRABALHO
  { type:'select4', eyebrow:'06 · Expectativas', question:'Como prefere trabalhar?', hint:'Alinhamento sobre ritmo e comunicação.',
    selects:[
      {id:'reunioes',  label:'Frequência de Reuniões', opts:['','Semanal','Quinzenal','Mensal','Conforme demanda']},
      {id:'canal',     label:'Canal de Comunicação',   opts:['','WhatsApp','E-mail','Slack / Teams','Indiferente']},
      {id:'decisor',   label:'Tomador de Decisão',     opts:['','Eu mesmo','Sócio(s)','Diretoria','Conselho']},
      {id:'autonomia', label:'Autonomia para Vhalen',  opts:['','Alta — confio e deixo executar','Média — valido decisões','Baixa — aprovo tudo']},
    ]
  },

  // 13 REL 1
  { type:'single', eyebrow:'07 · Relacionamento', question:'Como prefere receber atualizações e relatórios?',
    hint:'Estruturamos a comunicação do jeito que funciona melhor para você.',
    id:'relatorio', options:['Relatório escrito por e-mail','Resumo rápido em áudio ou vídeo','Dashboard visual em tempo real','Reunião de alinhamento quinzenal','Mensagem direta pelo WhatsApp'] },

  // 14 REL 2
  { type:'single', eyebrow:'07 · Relacionamento', question:'Como você lida com feedback e ajustes de rota?',
    hint:'Entender seu estilo torna a parceria mais fluida.',
    id:'feedback', options:['Prefiro receber direto, sem rodeios','Gosto de contexto antes do feedback','Prefiro discutir em reunião','Estou aberto a qualquer formato'] },

  // 15 REL 3
  { type:'single', eyebrow:'07 · Relacionamento', question:'Qual é o seu maior receio nesta parceria?',
    hint:'Transparência aqui nos permite trabalhar para evitar esses pontos.',
    id:'receio', options:['Falta de resultados concretos','Comunicação ruim ou desalinhamento','Falta de tempo para implementar','Resistência interna da equipe','Outro — detalharei nas observações'] },

  // 16 DIAGNÓSTICO
  { type:'rating', eyebrow:'08 · Autodiagnóstico', question:'Avalie a maturidade estratégica da empresa.',
    hint:'De 1 (muito fraco) a 5 (muito forte). Seja honesto.',
    dims:[
      {id:'r0',label:'Clareza de estratégia e direção'},
      {id:'r1',label:'Força do posicionamento de mercado'},
      {id:'r2',label:'Qualidade dos processos internos'},
      {id:'r3',label:'Performance comercial e de vendas'},
      {id:'r4',label:'Presença e autoridade digital'},
      {id:'r5',label:'Cultura organizacional e equipe'},
      {id:'r6',label:'Uso de tecnologia e dados'},
    ]
  },

  // 17 EXTRA
  { type:'textarea', eyebrow:'09 · Observações', question:'Algo mais que devemos saber?',
    hint:'Informações confidenciais, prazos críticos, ou qualquer contexto adicional.',
    id:'extra', ph:'Espaço livre — à vontade...', req:false },
];

const TOTAL = steps.length;
let cur = 0;

document.getElementById('totalNum').textContent = TOTAL;

// build dots
const dotsEl = document.getElementById('stepDots');
steps.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot'; d.id = `dot${i}`;
  dotsEl.appendChild(d);
});

function updateDots() {
  steps.forEach((_,i) => {
    const d = document.getElementById(`dot${i}`);
    if (!d) return;
    d.className = 'dot' + (i===cur?' active':i<cur?' done':'');
  });
}

function saveCur() {
  const s = steps[cur];
  if (s.type==='textarea') {
    const el = document.getElementById('f_'+s.id);
    if (el) flds[s.id] = el.value;
  } else if (s.type==='grid2') {
    s.inputs.forEach(f => { const el=document.getElementById('f_'+f.id); if(el) flds[f.id]=el.value; });
  } else if (s.type==='select4') {
    s.selects.forEach(f => { const el=document.getElementById('f_'+f.id); if(el) flds[f.id]=el.value; });
  }
}

function renderStep(idx) {
  const s = steps[idx];
  document.getElementById('stepNum').textContent = idx+1;
  document.getElementById('progressFill').style.width = (idx===0?0:(idx/(TOTAL-1))*100)+'%';
  document.getElementById('btnBack').disabled = idx===0;
  document.getElementById('btnNext').textContent = idx===TOTAL-1 ? 'Finalizar ✓' : 'Continuar →';
  updateDots();

  let html = '';

  if (s.type==='welcome') {
    html = `<div class="welcome-card">
      <div class="welcome-logo-wrap"><div class="welcome-logo-text">VC</div></div>
      <div class="welcome-company">Vhalen <span>Company</span></div>
      <div class="welcome-tagline">Strategic Intelligence</div>
      <div class="welcome-line"></div>
      <p class="welcome-desc">
        Bem-vindo ao seu <strong>Onboarding Estratégico</strong>.<br/>
        Este formulário foi criado para que possamos entender profundamente o seu negócio, seus desafios e objetivos —
        garantindo que nosso trabalho seja <strong>preciso, personalizado e orientado a resultados</strong>.
      </p>
      <div class="welcome-badges">
        <div class="badge">~ 5 minutos</div>
        <div class="badge">9 blocos estratégicos</div>
        <div class="badge">PDF gerado ao final</div>
        <div class="badge">Pós-fechamento</div>
      </div>
    </div>`;
  }

  else if (s.type==='textarea') {
    const v = flds[s.id]||'';
    html = `<div class="card">
      <div class="card-eyebrow">${s.eyebrow}</div>
      <div class="card-question">${s.question}</div>
      <div class="card-hint">${s.hint}</div>
      <div class="field">
        <textarea id="f_${s.id}" placeholder="${s.ph}" rows="5">${v}</textarea>
      </div>
    </div>`;
  }

  else if (s.type==='grid2') {
    const ins = s.inputs.map(f => {
      const v = flds[f.id]||'';
      return `<div class="field">
        <label>${f.label}${f.req?` <span class="req">*</span>`:''}</label>
        <input type="text" id="f_${f.id}" placeholder="${f.ph}" value="${v}"/>
      </div>`;
    }).join('');
    html = `<div class="card">
      <div class="card-eyebrow">${s.eyebrow}</div>
      <div class="card-question">${s.question}</div>
      <div class="card-hint">${s.hint}</div>
      <div class="grid2">${ins}</div>
    </div>`;
  }

  else if (s.type==='select4') {
    const sels = s.selects.map(f => {
      const v = flds[f.id]||'';
      const opts = f.opts.map(o=>`<option value="${o}"${v===o?' selected':''}>${o||'Selecione...'}</option>`).join('');
      return `<div class="field">
        <label>${f.label}</label>
        <select id="f_${f.id}">${opts}</select>
      </div>`;
    }).join('');
    html = `<div class="card">
      <div class="card-eyebrow">${s.eyebrow}</div>
      <div class="card-question">${s.question}</div>
      <div class="card-hint">${s.hint}</div>
      <div class="grid2">${sels}</div>
    </div>`;
  }

  else if (s.type==='multicheck') {
    const saved = mc[s.id]||[];
    const items = s.options.map(o => {
      const sel = saved.includes(o)?'selected':'';
      return `<div class="choice sq ${sel}" onclick="toggleMC('${s.id}',this)">
        <div class="choice-dot">✓</div>${o}
      </div>`;
    }).join('');
    html = `<div class="card">
      <div class="card-eyebrow">${s.eyebrow}</div>
      <div class="card-question">${s.question}</div>
      <div class="card-hint">${s.hint}</div>
      <div class="choices">${items}</div>
    </div>`;
  }

  else if (s.type==='single') {
    const saved = sc[s.id]||'';
    const items = s.options.map(o => {
      const sel = saved===o?'selected':'';
      return `<div class="choice ${sel}" onclick="toggleSC('${s.id}',this)">
        <div class="choice-dot">✓</div>${o}
      </div>`;
    }).join('');
    html = `<div class="card">
      <div class="card-eyebrow">${s.eyebrow}</div>
      <div class="card-question">${s.question}</div>
      <div class="card-hint">${s.hint}</div>
      <div class="choices">${items}</div>
    </div>`;
  }

  else if (s.type==='rating') {
    const rows = s.dims.map(d => {
      const v = ratings[d.id]||0;
      const stars = [1,2,3,4,5].map(n =>
        `<div class="star${v>=n?' on':''}" data-dim="${d.id}" data-val="${n}" onclick="setR('${d.id}',${n})">${n}</div>`
      ).join('');
      return `<div class="r-row">
        <div class="r-label">${d.label}</div>
        <div class="stars">${stars}</div>
      </div>`;
    }).join('');
    html = `<div class="card">
      <div class="card-eyebrow">${s.eyebrow}</div>
      <div class="card-question">${s.question}</div>
      <div class="card-hint">${s.hint}</div>
      <div class="rating-block">${rows}</div>
    </div>`;
  }

  document.getElementById('stage').innerHTML = html;
  const first = document.querySelector('#stage input, #stage textarea');
  if (first) setTimeout(()=>first.focus(), 60);
}

function toggleMC(id, el) {
  el.classList.toggle('selected');
  if (!mc[id]) mc[id]=[];
  const lbl = el.textContent.trim();
  const i = mc[id].indexOf(lbl);
  if (i>-1) mc[id].splice(i,1); else mc[id].push(lbl);
}

function toggleSC(id, el) {
  document.querySelectorAll('#stage .choice').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  sc[id] = el.textContent.trim();
}

function setR(dim, val) {
  ratings[dim]=val;
  document.querySelectorAll(`.star[data-dim="${dim}"]`).forEach(s=>{
    s.classList.toggle('on', parseInt(s.dataset.val)<=val);
  });
}

function validate() {
  const s = steps[cur];
  if (s.type==='welcome') return true;
  if (s.type==='textarea' && s.req) {
    const el=document.getElementById('f_'+s.id);
    return el && el.value.trim().length>0;
  }
  if (s.type==='grid2') {
    return s.inputs.filter(f=>f.req).every(f=>{
      const el=document.getElementById('f_'+f.id);
      return el && el.value.trim().length>0;
    });
  }
  return true;
}

function shake() {
  const card = document.querySelector('.card, .welcome-card');
  if (!card) return;
  const seq=[10,-10,6,-6,3,0];
  seq.forEach((x,i)=>setTimeout(()=>{card.style.transform=`translateX(${x}px)`;},i*65));
  setTimeout(()=>{card.style.transform='';},seq.length*65+50);
}

function goNext() {
  if (!validate()) { shake(); return; }
  saveCur();
  if (cur===TOTAL-1) { buildPDF(); return; }
  const card = document.querySelector('.card, .welcome-card');
  if (card) { card.classList.add('out'); setTimeout(()=>{ cur++; renderStep(cur); },260); }
  else { cur++; renderStep(cur); }
}

function goBack() {
  if (cur===0) return;
  saveCur();
  const card = document.querySelector('.card, .welcome-card');
  if (card) { card.style.animation='cardOut 0.22s ease both'; setTimeout(()=>{ cur--; renderStep(cur); },200); }
  else { cur--; renderStep(cur); }
}

document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) goNext(); });

// ── PDF ──
function gf(id){ return flds[id]||'—'; }
function gmc(id){ return (mc[id]||[]).join(', ')||'—'; }
function gsc(id){ return sc[id]||'—'; }
function grv(id){ return ratings[id]?`${ratings[id]}/5`:'—'; }
function grl(id){ return ['—','Muito fraco','Fraco','Médio','Forte','Muito forte'][ratings[id]||0]; }

let _pdfDoc, _pdfName;

function buildPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W=210, ml=18, cw=174;
  let y=0;

  const NV=[13,27,42],ST=[74,127,165],SL=[107,157,192];
  const WH=[255,255,255],SF=[244,246,247],TX=[13,27,42],MU=[107,139,164];

  function chk(n=16){ if(y+n>276){doc.addPage();y=18;} }

  doc.setFillColor(...NV); doc.rect(0,0,W,40,'F');
  doc.setFillColor(...ST); doc.rect(0,40,W,1.5,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(...WH);
  doc.text('Vhalen Company',ml,17);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...SL);
  doc.text('STRATEGIC INTELLIGENCE',ml,23);
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...SF);
  doc.text('ONBOARDING ESTRATÉGICO — PÓS-FECHAMENTO',ml,33);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...MU);
  doc.text(new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}),W-ml,33,{align:'right'});
  y=50;

  function sec(n,t){
    chk(14);
    doc.setFillColor(...NV); doc.rect(ml-2,y,cw+4,9,'F');
    doc.setFillColor(...ST); doc.rect(ml-2,y+9,cw+4,1,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...SL);
    doc.text(n,ml+1,y+6);
    doc.setFontSize(9); doc.setTextColor(...WH);
    doc.text(t.toUpperCase(),ml+14,y+6);
    y+=14;
  }
  function fld(l,v){
    chk(14);
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...MU);
    doc.text(l.toUpperCase(),ml,y); y+=4;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...TX);
    doc.splitTextToSize(v||'—',cw).forEach(line=>{chk(6);doc.text(line,ml,y);y+=5;});
    y+=3;
  }
  function r2(a,b){
    chk(14); const h=cw/2;
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...MU);
    doc.text(a[0].toUpperCase(),ml,y); doc.text(b[0].toUpperCase(),ml+h,y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...TX);
    doc.text(a[1]||'—',ml,y+5); doc.text(b[1]||'—',ml+h,y+5);
    y+=14;
  }

  sec('01','Identificação');
  r2(['Nome / Razão Social',gf('nome')],['Responsável',gf('resp')]);
  r2(['Cargo',gf('cargo')],['E-mail',gf('email')]);
  r2(['Segmento',gf('segmento')],['Tempo de Mercado',gf('tempo')]);
  r2(['Localização',gf('local')],['Website',gf('site')]);

  sec('02','Contexto');
  fld('O que a empresa faz',gf('oqueefaz'));

  sec('03','Desafios e Objetivos');
  fld('Principal Desafio Atual',gf('desafio'));
  fld('Principais Gargalos',gmc('gargalos'));
  fld('Objetivos para os Próximos 12 Meses',gf('objetivos'));

  sec('04','Estrutura Interna');
  r2(['Área Comercial',gf('comercial')],['Área de Marketing',gf('mktarea')]);
  r2(['Uso de CRM',gf('crm')],['Processos Documentados',gf('processos')]);
  fld('Ferramentas em Uso',gmc('ferramentas'));

  sec('05','Histórico Estratégico');
  fld('Experiência Anterior com Consultoria',gsc('historico'));
  fld('O que Não Quer Repetir',gmc('naorepetir'));

  sec('06','Expectativas e Forma de Trabalho');
  fld('Expectativas — Primeiros 90 Dias',gf('expectativas'));
  r2(['Frequência de Reuniões',gf('reunioes')],['Canal de Comunicação',gf('canal')]);
  r2(['Tomador de Decisão',gf('decisor')],['Autonomia para Vhalen',gf('autonomia')]);

  sec('07','Relacionamento com o Cliente');
  fld('Formato de Atualizações Preferido',gsc('relatorio'));
  fld('Estilo de Feedback',gsc('feedback'));
  fld('Maior Receio na Parceria',gsc('receio'));

  sec('08','Autodiagnóstico — Maturidade Estratégica');
  chk(10);
  doc.setFillColor(...NV); doc.rect(ml,y,cw,7,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...SL);
  doc.text('DIMENSÃO',ml+2,y+5); doc.text('AVALIAÇÃO',ml+cw-2,y+5,{align:'right'});
  y+=9;
  [{id:'r0',l:'Clareza de estratégia e direção'},{id:'r1',l:'Força do posicionamento de mercado'},
   {id:'r2',l:'Qualidade dos processos internos'},{id:'r3',l:'Performance comercial e de vendas'},
   {id:'r4',l:'Presença e autoridade digital'},{id:'r5',l:'Cultura organizacional e equipe'},
   {id:'r6',l:'Uso de tecnologia e dados'}].forEach((d,i)=>{
    chk(8);
    if(i%2===0){doc.setFillColor(...SF);doc.rect(ml,y-1,cw,7,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...TX);
    doc.text(d.l,ml+2,y+4);
    doc.setFont('helvetica','bold'); doc.setTextColor(...ST);
    doc.text(`${grv(d.id)}  ${grl(d.id)}`,ml+cw-2,y+4,{align:'right'});
    y+=8;
  });
  y+=4;

  sec('09','Observações Finais');
  fld('Contexto Adicional',gf('extra'));

  chk(18); y+=6;
  doc.setFillColor(...NV); doc.rect(ml-2,y,cw+4,16,'F');
  doc.setFillColor(...ST); doc.rect(ml-2,y,cw+4,1,'F');
  doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(...MU);
  doc.text('Ao preencher este documento, você dá início à construção de uma direção estratégica sólida.',W/2,y+8,{align:'center'});
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...SL);
  doc.text('VHALEN COMPANY  •  Strategic Intelligence',W/2,y+14,{align:'center'});

  _pdfName = `Vhalen_Onboarding_${(gf('nome')).replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
  _pdfDoc = doc;
  showSuccess();
}

function showSuccess() {
  const name = flds['nome']||flds['resp']||'';
  document.getElementById('successScreen').innerHTML = `
    <div class="success-visual">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="success-core">✓</div>
    </div>
    <div class="success-title">Onboarding Concluído</div>
    ${name?`<div class="success-client">— ${name} —</div>`:''}
    <div class="success-line"></div>
    <p class="success-msg">Suas respostas foram registradas com sucesso.<br/>Em breve a Vhalen Company entrará em contato para dar início ao trabalho estratégico.</p>
    <button class="btn-pdf" onclick="if(window._pdfDoc)window._pdfDoc.save(window._pdfName)">
      ⬇ &nbsp;Baixar Briefing em PDF
    </button>`;
  window._pdfDoc = _pdfDoc;
  window._pdfName = _pdfName;
  document.getElementById('successScreen').classList.add('show');
  document.getElementById('topBar').style.display='none';
  document.getElementById('progressTrack').style.display='none';
  document.getElementById('navBar').style.display='none';
}

renderStep(0);
</script>
